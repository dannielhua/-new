<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>维也纳基督教会 · 图书借阅</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #5b6abf;
            --borrow: #f59e0b;
            --return: #10b981;
            --danger: #ef4444;
            --cat-colors: #ff7675, #fdcb6e, #55efc4, #74b9ff, #a29bfe, #fd79a8, #00b894, #6c5ce7, #b2bec3;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans', sans-serif;
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }
        .main-content { flex: 1.2; min-width: 0; }
        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: sticky;
            top: 60px;
        }
        /* 主卡片完全透明 */
        .card {
            background: transparent;
            border-radius: 0;
            padding: 24px;
            box-shadow: none;
            border: none;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
        }
        .church-header {
            text-align: center;
            padding: 20px 0 10px;
            color: #fff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
        }
        .church-header img {
            max-width: 550px;  /* 标题图片更大 */
            height: auto;
            margin-bottom: 10px;
            border-radius: 25px;
        }
        .church-header p { font-size: 1.8rem; margin-top: 6px; } /* 文字更大 */
        .btn {
            padding: 10px 20px; border: none; border-radius: 25px;
            font-weight: 600; cursor: pointer; font-size: 0.95rem;
            background: var(--primary); color: #fff;
            transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-borrow { background: var(--borrow); }
        .btn-return { background: var(--return); }
        .btn-danger { background: var(--danger); }
        .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-weight: 600; margin-bottom: 6px;
            color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
        }
        .form-group input {
            width: 100%; padding: 12px 16px;
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 12px; font-size: 1rem;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            color: #fff;
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.8); }
        .flex-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .badge-available { background: #d1fae5; color: #065f46; }
        .badge-borrowed { background: #fef3c7; color: #92400e; }
        .hidden { display: none !important; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 16px; padding: 28px; width: 90%; max-width: 500px; color: #333; }
        .toast { position: fixed; top: 20px; right: 20px; background: #333; color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: 600; z-index: 2000; animation: fadeOut 3s forwards; }
        @keyframes fadeOut { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
        .tab-nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-nav button {
            padding: 10px 18px; border: 2px solid rgba(0,0,0,0.15); border-radius: 25px;
            background: rgba(255,255,255,0.8); cursor: pointer; font-weight: 600;
            color: #333;
        }
        .tab-nav button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input {
            flex: 1; padding: 12px; border-radius: 25px;
            border: 2px solid rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            color: #fff;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.8); }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin: 16px 0; }
        .cat-card { border-radius: 10px; padding: 12px; text-align: center; font-weight: 600; color: #fff; cursor: pointer; transition: 0.2s; }
        .cat-card:hover { filter: brightness(0.95); transform: scale(1.02); }
        .category-section { margin-bottom: 24px; }
        .category-section h3 {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            padding: 8px 16px; border-radius: 6px; font-size: 1rem; margin-bottom: 8px;
            color: #fff;
        }
        .book-row {
            display: flex; justify-content: space-between; padding: 6px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .book-row span { flex: 1; }
        /* 右侧卡片完全透明 */
        .sidebar-card {
            cursor: pointer; transition: 0.2s; text-align: center; padding: 24px 16px;
            border-radius: 16px;
            background: transparent;
            border: none;
            color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
        }
        .sidebar-card:hover { transform: translateY(-4px); }
        .sidebar-card .icon { font-size: 2.4rem; margin-bottom: 8px; }
        .back-btn { cursor: pointer; color: #fff; font-weight: 600; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        @media (max-width: 800px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; position: static; flex-direction: row; flex-wrap: wrap; gap: 12px; }
            .sidebar-card { flex: 1; min-width: 120px; }
            .church-header img { max-width: 350px; }
        }
        /* 表格透明化 */
        table {
            width: 100%; border-collapse: collapse; font-size: 0.95rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            border-radius: 12px; overflow: hidden;
            color: #fff;
        }
        th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.3); }
        th { background: rgba(255,255,255,0.2); font-weight: 600; }
        tr:hover { background: rgba(255,255,255,0.15); }
        /* 管理员后台保持清晰 */
        #adminView {
            color: #222;
            background: rgba(255,255,255,0.92) !important;
            backdrop-filter: blur(10px);
        }
        #adminView table { color: #222; background: rgba(255,255,255,0.6); }
        #adminView th { background: rgba(255,255,255,0.8); color: #111; }
        #adminView .btn-outline { color: var(--primary); border-color: var(--primary); }
        /* 修改密码标签优化 */
        .pwd-label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            color: #333;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="main-content">
        <div class="church-header">
            <img src="logo.png" alt="维也纳基督教会">
            <p>图书借阅</p>
        </div>
        <div class="card" id="dynamicContent"></div>
    </div>
    <div class="sidebar">
        <div class="sidebar-card" onclick="showNotice()"><div class="icon">📖</div><h3>借还书须知</h3><p>规则与说明</p></div>
        <div class="sidebar-card" onclick="switchToBookList()"><div class="icon">📚</div><h3>图书查询</h3><p>全部藏书一览</p></div>
        <div class="sidebar-card" onclick="openAdmin()"><div class="icon">⚙️</div><h3>管理</h3><p>管理员入口</p></div>
    </div>
</div>

<!-- 借还书须知弹窗 -->
<div id="noticeModal" class="modal-overlay hidden">
    <div class="modal">
        <h2>📖 借还书须知</h2>
        <div style="text-align:left; line-height:1.8;">
            <h3>借书说明</h3><ol><li>请依次扫描每本图书上的二维码。</li><li>填写借阅人姓名及借书日期。</li><li>确认信息无误后，点击「借书」图标完成借阅登记。</li></ol>
            <h3>还书说明</h3><ol><li>请扫描需归还图书上的二维码。</li><li>填写借阅人姓名及还书日期。</li><li>确认信息无误后，点击「还书」图标完成归还登记。</li></ol>
            <h3>借阅期限</h3><p>每本图书的借阅期限为三个月。请于到期日前归还图书，以便其他读者借阅。</p>
        </div>
        <button class="btn" onclick="document.getElementById('noticeModal').classList.add('hidden')">关闭</button>
    </div>
</div>

<!-- 管理员登录弹窗 -->
<div id="loginModal" class="modal-overlay hidden">
    <div class="modal">
        <h3>🔑 管理员登录</h3>
        <div class="form-group"><input type="password" id="loginPassword" placeholder="请输入管理员密码"></div>
        <button class="btn" onclick="adminLogin()">登录</button>
        <button class="btn btn-outline" onclick="document.getElementById('loginModal').classList.add('hidden')">取消</button>
    </div>
</div>

<!-- 管理员后台 -->
<div id="adminView" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:2000; overflow-y:auto; padding:24px;">
    <button class="btn btn-danger" style="float:right;" onclick="adminLogout()">退出</button>
    <h2>📊 管理员后台</h2>
    <div class="tab-nav" style="margin-top:12px;">
        <button class="active" data-tab="books">📚 图书管理</button>
        <button data-tab="records">📜 借阅历史</button>
        <button data-tab="overdue">⚠️ 逾期未还</button>
        <button data-tab="import">📤 导入 Excel</button>
        <button data-tab="export">📥 导出 Excel</button>
        <button data-tab="qrcode">📱 生成二维码</button>
        <button data-tab="settings">⚙️ 系统设置</button>
    </div>
    <div id="adminContent"></div>
</div>

<script>
    const SUPABASE_URL = 'https://ervhqbfelryohfvyuaok.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVydmhxYmZlbHJ5b2hmdnl1YW9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMTA5MTQsImV4cCI6MjA5ODg4NjkxNH0.z-FdF47zHB3ai0f1VylUgVbxWUwBZF7I0oY8NAwh2gw';
    const DEFAULT_PASSWORD = 'admin123';
    const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let adminToken = localStorage.getItem('adminToken') || '';
    let currentView = 'home';

    // 密码工具
    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const key = await crypto.subtle.importKey('raw', encoder.encode(password), 'PBKDF2', false, ['deriveBits']);
        const bits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, key, 256);
        const hash = Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2, '0')).join('');
        return Array.from(salt).map(b => b.toString(16).padStart(2, '0')).join('') + ':' + hash;
    }
    async function verifyPassword(password, hashed) {
        const encoder = new TextEncoder();
        const [saltHex, hashHex] = hashed.split(':');
        const salt = new Uint8Array(saltHex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
        const key = await crypto.subtle.importKey('raw', encoder.encode(password), 'PBKDF2', false, ['deriveBits']);
        const bits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, key, 256);
        const newHash = Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2, '0')).join('');
        return newHash === hashHex;
    }

    async function initSettings() {
        const { data } = await mySupabase.from('settings').select('value').eq('key', 'admin_password').single();
        if (!data) await mySupabase.from('settings').insert({ key: 'admin_password', value: await hashPassword(DEFAULT_PASSWORD) });
    }
    initSettings();

    function showToast(msg, type='info') {
        const t = document.createElement('div'); t.className = 'toast';
        t.style.background = type==='error'?'#ef4444':type==='success'?'#10b981':'#333';
        t.textContent = msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 3000);
    }
    function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

    const categories = ['教会1','教会2','教会3','教会4','教会5','教会6','教会7','教会8'];
    const catColors = ['#ff7675','#fdcb6e','#55efc4','#74b9ff','#a29bfe','#fd79a8','#00b894','#6c5ce7','#b2bec3'];

    // ========== 首页（分类方块） ==========
    async function showHome() {
        currentView = 'home';
        const { data: books } = await mySupabase.from('books').select('category');
        const counts = {};
        categories.forEach(c => counts[c] = 0);
        let uncategorized = 0;
        books.forEach(b => {
            if (categories.includes(b.category)) counts[b.category]++;
            else uncategorized++;
        });
        let html = `<h3 style="margin-bottom:12px;color:#fff;">📂 图书分类</h3><div class="category-grid">`;
        categories.forEach((c, i) => {
            html += `<div class="cat-card" style="background:${catColors[i]}" onclick="switchToBookList('${c}')">${c}<br><small>${counts[c]}本</small></div>`;
        });
        html += `<div class="cat-card" style="background:#b2bec3" onclick="switchToBookList('未分类')">未分类<br><small>${uncategorized}本</small></div>`;
        html += `</div>`;
        document.getElementById('dynamicContent').innerHTML = html;
    }

    // ========== 图书查询视图 ==========
    async function switchToBookList(category = null) {
        currentView = 'bookList';
        const { data: books } = await mySupabase.from('books').select('*').order('code');
        renderBookList(books, '', category);
    }

    function renderBookList(allBooks, searchTerm, selectedCategory) {
        let filtered = allBooks;
        if (searchTerm) filtered = allBooks.filter(b => b.title.toLowerCase().includes(searchTerm.toLowerCase()));
        if (selectedCategory) {
            if (selectedCategory === '未分类') filtered = filtered.filter(b => !categories.includes(b.category));
            else filtered = filtered.filter(b => b.category === selectedCategory);
        }
        const grouped = {};
        categories.forEach(c => grouped[c] = []);
        let uncategorized = [];
        filtered.forEach(b => {
            if (categories.includes(b.category)) grouped[b.category].push(b);
            else uncategorized.push(b);
        });
        let html = '';
        if (!selectedCategory) {
            html += `<div class="search-box">
                <input type="text" id="searchTitle" placeholder="🔍 搜索书名..." onkeyup="if(event.key==='Enter') searchBooks()">
                <button class="btn" onclick="searchBooks()">搜索</button>
            </div>`;
            html += '<div class="category-grid">';
            categories.forEach((c, i) => {
                const cnt = allBooks.filter(b => b.category === c).length;
                html += `<div class="cat-card" style="background:${catColors[i]}" onclick="switchToBookList('${c}')">${c}<br><small>${cnt}本</small></div>`;
            });
            const uncatCnt = allBooks.filter(b => !categories.includes(b.category)).length;
            html += `<div class="cat-card" style="background:#b2bec3" onclick="switchToBookList('未分类')">未分类<br><small>${uncatCnt}本</small></div>`;
            html += '</div>';
        } else {
            html += `<div class="book-list-header">
                <span class="back-btn" onclick="switchToBookList()">← 返回全部</span>
                <h3 style="color:#fff;">${selectedCategory} (${filtered.length}本)</h3>
            </div>`;
        }
        if (filtered.length === 0) html += '<p style="color:#fff;">暂无图书</p>';
        else if (selectedCategory) {
            html += '<table><thead><tr><th>编号</th><th>书名</th><th>作者</th><th>状态</th></tr></thead><tbody>';
            filtered.forEach(b => {
                html += `<tr><td><strong>${esc(b.code)}</strong></td><td>${esc(b.title)}</td><td>${esc(b.author||'')}</td><td>${b.status==='available'?'<span class="badge badge-available">在馆</span>':'<span class="badge badge-borrowed">借出</span>'}</td></tr>`;
            });
            html += '</tbody></table>';
        } else {
            for (const cat of categories) {
                const items = grouped[cat];
                if (items.length === 0) continue;
                html += `<div class="category-section"><h3>${cat} (${items.length}本)</h3>`;
                items.forEach(b => {
                    html += `<div class="book-row"><span><strong>${esc(b.code)}</strong></span><span>${esc(b.title)}</span><span>${esc(b.author)}</span><span>${b.status==='available'?'<span class="badge badge-available">在馆</span>':'<span class="badge badge-borrowed">借出</span>'}</span></div>`;
                });
                html += `</div>`;
            }
            if (uncategorized.length > 0) {
                html += `<div class="category-section"><h3>未分类 (${uncategorized.length}本)</h3>`;
                uncategorized.forEach(b => {
                    html += `<div class="book-row"><span><strong>${esc(b.code)}</strong></span><span>${esc(b.title)}</span><span>${esc(b.author)}</span><span>${b.status==='available'?'<span class="badge badge-available">在馆</span>':'<span class="badge badge-borrowed">借出</span>'}</span></div>`;
                });
                html += `</div>`;
            }
        }
        document.getElementById('dynamicContent').innerHTML = html;
    }

    function searchBooks() {
        const term = document.getElementById('searchTitle')?.value.trim() || '';
        mySupabase.from('books').select('*').order('code').then(({data}) => renderBookList(data, term, null));
    }

    // ========== 扫码后图书详情 ==========
    async function showBookDetail(code) {
        currentView = 'detail';
        const { data: book } = await mySupabase.from('books').select('*').eq('code', code).single();
        if (!book) { showToast('图书不存在','error'); return; }
        let html = `<h2 style="color:#fff;">📖 ${esc(book.title)}</h2>`;
        html += `<p style="color:#fff;">编号：${esc(book.code)} | 作者：${esc(book.author)} | 分类：${esc(book.category)}</p>`;
        if (book.status === 'available') {
            html += `<span class="badge badge-available">✅ 可借</span>`;
            html += `<div class="form-group" style="margin-top:16px;">
                <input type="text" id="borrowName" placeholder="您的姓名">
                <input type="date" id="borrowDate" value="${new Date().toISOString().split('T')[0]}" style="margin-top:10px;">
            </div>`;
            html += `<button class="btn btn-borrow" onclick="doBorrow('${book.code}')">📤 借出</button>`;
        } else {
            html += `<span class="badge badge-borrowed">📖 已借出</span>`;
            html += `<div class="form-group" style="margin-top:16px;">
                <input type="text" id="returnName" placeholder="您的姓名">
                <input type="date" id="returnDate" value="${new Date().toISOString().split('T')[0]}" style="margin-top:10px;">
            </div>`;
            html += `<button class="btn btn-return" onclick="doReturn('${book.code}')">📥 还书</button>`;
        }
        html += `<div style="margin-top:24px;"><span class="back-btn" onclick="showHome()">← 返回首页</span></div>`;
        document.getElementById('dynamicContent').innerHTML = html;
    }

    async function doBorrow(code) {
        const name = document.getElementById('borrowName').value.trim();
        const date = document.getElementById('borrowDate').value;
        if (!name) return showToast('请填写姓名','error');
        const due = new Date(date); due.setDate(due.getDate() + 90);
        const dueDate = due.toISOString().split('T')[0];
        await mySupabase.from('books').update({ status: 'borrowed' }).eq('code', code);
        await mySupabase.from('borrow_records').insert({
            book_code: code, book_name: '',
            borrower_name: name, borrower_phone: '',
            borrow_date: date, due_date: dueDate
        });
        showToast(`借书成功！应还日期：${dueDate}`, 'success');
        showBookDetail(code);
    }

    async function doReturn(code) {
        const name = document.getElementById('returnName').value.trim();
        if (!name) return showToast('请填写姓名','error');
        const date = document.getElementById('returnDate').value || new Date().toISOString().split('T')[0];
        await mySupabase.from('books').update({ status: 'available' }).eq('code', code);
        await mySupabase.from('borrow_records').update({ return_date: date }).eq('book_code', code).is('return_date', null);
        showToast('还书成功！','success');
        showBookDetail(code);
    }

    // 右侧功能
    function showNotice() { document.getElementById('noticeModal').classList.remove('hidden'); }
    function openAdmin() {
        if (adminToken) showAdminPanel();
        else document.getElementById('loginModal').classList.remove('hidden');
    }
    async function adminLogin() {
        const pwd = document.getElementById('loginPassword').value;
        const { data } = await mySupabase.from('settings').select('value').eq('key', 'admin_password').single();
        if (!data || !(await verifyPassword(pwd, data.value))) return showToast('密码错误','error');
        adminToken = 'valid';
        localStorage.setItem('adminToken', adminToken);
        document.getElementById('loginModal').classList.add('hidden');
        showAdminPanel();
    }
    function adminLogout() {
        adminToken = '';
        localStorage.removeItem('adminToken');
        document.getElementById('adminView').classList.add('hidden');
        showToast('已退出','info');
    }
    function showAdminPanel() { document.getElementById('adminView').classList.remove('hidden'); switchTab('books'); }

    document.querySelector('#adminView .tab-nav').addEventListener('click', e => {
        if (e.target.tagName === 'BUTTON') switchTab(e.target.dataset.tab);
    });
    function switchTab(tab) {
        document.querySelectorAll('#adminView .tab-nav button').forEach(b => b.classList.remove('active'));
        document.querySelector(`#adminView .tab-nav button[data-tab="${tab}"]`)?.classList.add('active');
        const container = document.getElementById('adminContent');
        switch(tab) {
            case 'books': loadBooksAdmin(); break;
            case 'records': loadRecords(); break;
            case 'overdue': loadOverdue(); break;
            case 'import': showImport(); break;
            case 'export': showExport(); break;
            case 'qrcode': showQRCode(); break;
            case 'settings': showSettings(); break;
        }
    }

    // ---------- 管理员图书管理 ----------
    async function loadBooksAdmin() {
        const { data: books } = await mySupabase.from('books').select('*').order('code');
        const { data: records } = await mySupabase.from('borrow_records').select('*').is('return_date', null);
        const map = {}; if (records) records.forEach(r => { map[r.book_code] = r; });
        let html = `<button class="btn" onclick="showAddForm()">➕ 新增图书</button>
        <table class="admin-table" style="margin-top:12px;"><thead><tr><th>编号</th><th>书名</th><th>作者</th><th>分类</th><th>状态</th><th>借阅人</th><th>操作</th></tr></thead><tbody>`;
        books.forEach(b => {
            const br = map[b.code] || {};
            html += `<tr><td>${esc(b.code)}</td><td>${esc(b.title)}</td><td>${esc(b.author)}</td><td>${esc(b.category)}</td>
                <td>${b.status==='available'?'<span class="badge badge-available">在馆</span>':'<span class="badge badge-borrowed">借出</span>'}</td>
                <td>${esc(br.borrower_name)}</td>
                <td><button class="btn btn-outline" onclick="editBook('${b.code}')">✏️</button> <button class="btn btn-danger" onclick="deleteBook('${b.code}')">🗑</button></td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('adminContent').innerHTML = html;
    }
    function showAddForm(book=null) {
        const isEdit = !!book;
        let html = `<h3>${isEdit?'编辑':'新增'}图书</h3>
        <div class="form-group"><input id="editCode" placeholder="编号" value="${isEdit?book.code:''}" ${isEdit?'disabled':''}></div>
        <div class="form-group"><input id="editTitle" placeholder="书名" value="${isEdit?book.title:''}"></div>
        <div class="form-group"><input id="editAuthor" placeholder="作者" value="${isEdit?book.author||'':''}"></div>
        <div class="form-group"><select id="editCategory">${categories.map(c => `<option ${(book&&book.category===c)?'selected':''}>${c}</option>`).join('')}</select></div>
        <button class="btn" onclick="saveBook('${isEdit?book.code:''}')">保存</button>`;
        document.getElementById('adminContent').innerHTML = html;
    }
    function editBook(code) { mySupabase.from('books').select('*').eq('code', code).single().then(({data}) => showAddForm(data)); }
    async function saveBook(originalCode) {
        const code = document.getElementById('editCode').value.trim();
        const data = { title: document.getElementById('editTitle').value.trim(), author: document.getElementById('editAuthor').value.trim(), category: document.getElementById('editCategory').value };
        if (originalCode) await mySupabase.from('books').update(data).eq('code', originalCode);
        else { data.code = code; await mySupabase.from('books').insert(data); }
        showToast('保存成功','success'); loadBooksAdmin();
    }
    async function deleteBook(code) { if (confirm(`删除 ${code}？`)) { await mySupabase.from('books').delete().eq('code', code); showToast('已删除','success'); loadBooksAdmin(); } }

    async function loadRecords() {
        const { data } = await mySupabase.from('borrow_records').select('*').order('created_at', { ascending: false });
        let html = `<table class="admin-table"><thead><tr><th>编号</th><th>书名</th><th>借阅人</th><th>借书日期</th><th>应还日期</th><th>归还日期</th></tr></thead><tbody>`;
        data.forEach(r => { html += `<tr><td>${esc(r.book_code)}</td><td>${esc(r.book_name||'')}</td><td>${esc(r.borrower_name)}</td><td>${r.borrow_date}</td><td>${r.due_date}</td><td>${r.return_date||'未还'}</td></tr>`; });
        html += '</tbody></table>'; document.getElementById('adminContent').innerHTML = html;
    }
    async function loadOverdue() {
        const today = new Date().toISOString().split('T')[0];
        const { data } = await mySupabase.from('borrow_records').select('*').is('return_date', null).lt('due_date', today);
        let html = `<h3>逾期未还 (${data.length})</h3>`; if (data.length) html += '<table class="admin-table"><tr><th>编号</th><th>借阅人</th><th>应还日期</th></tr>';
        data.forEach(r => { html += `<tr><td>${esc(r.book_code)}</td><td>${esc(r.borrower_name)}</td><td>${r.due_date}</td></tr>`; });
        if (data.length) html += '</table>'; else html += '<p>无逾期</p>';
        document.getElementById('adminContent').innerHTML = html;
    }

    function showImport() {
        document.getElementById('adminContent').innerHTML = `<h3>📤 导入 Excel / CSV</h3>
            <input type="file" id="importFile" accept=".csv,.xlsx" style="margin-bottom:12px;">
            <button class="btn" onclick="doImport()">开始导入</button><div id="importResult"></div>`;
    }
    async function doImport() {
        const file = document.getElementById('importFile').files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet);
            let ok = 0, skip = 0;
            for (const row of rows) {
                const code = (row.code || row['编号'] || '').toString().trim();
                const title = (row.title || row.book_name || row['书名'] || '').toString().trim();
                if (!code || !title) { skip++; continue; }
                let category = row.category || row['分类'] || '';
                if (!categories.includes(category)) category = '未分类';
                const { data: exist } = await mySupabase.from('books').select('id').eq('code', code).single();
                if (exist) await mySupabase.from('books').update({ title, author: row.author||row['作者']||'', category }).eq('code', code);
                else await mySupabase.from('books').insert({ code, title, author: row.author||'', category });
                ok++;
            }
            document.getElementById('importResult').innerHTML = `<p>成功 ${ok} 条，跳过 ${skip} 条</p>`;
            showToast('导入完成','success');
        };
        reader.readAsArrayBuffer(file);
    }

    function showExport() { document.getElementById('adminContent').innerHTML = `<h3>📥 导出图书库存</h3><button class="btn" onclick="doExport()">下载 Excel</button>`; }
    async function doExport() {
        const { data: books } = await mySupabase.from('books').select('*').order('code');
        const { data: records } = await mySupabase.from('borrow_records').select('*').is('return_date', null);
        const map = {}; if (records) records.forEach(r => { map[r.book_code] = r; });
        const ws_data = [['编号','书名','作者','分类','状态','借阅人','借书日期','应还日期']];
        books.forEach(b => {
            const br = map[b.code] || {};
            ws_data.push([b.code, b.title, b.author, b.category, b.status==='available'?'在馆':'借出', br.borrower_name||'', br.borrow_date||'', br.due_date||'']);
        });
        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '图书库存');
        XLSX.writeFile(wb, '图书库存.xlsx');
    }

    function showQRCode() {
        const savedUrl = localStorage.getItem('qrBaseUrl') || window.location.origin + '/?code=';
        document.getElementById('adminContent').innerHTML = `<h3>📱 生成图书二维码</h3>
            <label><input type="checkbox" id="includeUrl" checked> 包含访问网址</label>
            <input type="text" id="baseUrl" value="${savedUrl}" style="width:100%;margin:8px 0; padding:12px; border-radius:12px;">
            <button class="btn" onclick="generateQRCodes()">生成所有图书二维码</button>
            <div class="qr-container" id="qrContainer"></div>`;
    }
    async function generateQRCodes() {
        const includeUrl = document.getElementById('includeUrl').checked;
        const baseUrl = document.getElementById('baseUrl').value.trim();
        if (baseUrl) localStorage.setItem('qrBaseUrl', baseUrl);
        const { data: books } = await mySupabase.from('books').select('code,title').order('code');
        const container = document.getElementById('qrContainer');
        container.innerHTML = '';
        books.forEach(b => {
            const content = includeUrl ? baseUrl + b.code : b.code;
            const div = document.createElement('div'); div.style.background='#fff'; div.style.padding='8px'; div.style.borderRadius='8px'; div.style.textAlign='center';
            div.innerHTML = `<p>${esc(b.code)}<br>${esc(b.title)}</p>`;
            const canvas = document.createElement('canvas');
            QRCode.toCanvas(canvas, content, { width: 120, margin: 1 }, err => { if(err) console.warn(err); });
            canvas.style.background = '#fff';
            div.appendChild(canvas);
            container.appendChild(div);
        });
    }

    // 修改密码（带标签）
    function showSettings() {
        document.getElementById('adminContent').innerHTML = `
            <h3>⚙️ 修改管理员密码</h3>
            <div class="form-group">
                <label class="pwd-label">旧密码</label>
                <input type="password" id="oldPwd" placeholder="请输入当前密码">
            </div>
            <div class="form-group">
                <label class="pwd-label">新密码</label>
                <input type="password" id="newPwd" placeholder="请输入新密码">
            </div>
            <div class="form-group">
                <label class="pwd-label">确认新密码</label>
                <input type="password" id="confirmPwd" placeholder="请再次输入新密码">
            </div>
            <button class="btn" onclick="changePwd()">修改密码</button>`;
    }
    async function changePwd() {
        const old = document.getElementById('oldPwd').value;
        const newPwd = document.getElementById('newPwd').value;
        const confirmPwd = document.getElementById('confirmPwd').value;
        if (!old || !newPwd) return showToast('请填写完整','error');
        if (newPwd !== confirmPwd) return showToast('两次密码不一致','error');
        const { data } = await mySupabase.from('settings').select('value').eq('key', 'admin_password').single();
        if (!(await verifyPassword(old, data.value))) return showToast('旧密码错误','error');
        await mySupabase.from('settings').update({ value: await hashPassword(newPwd) }).eq('key', 'admin_password');
        showToast('密码修改成功','success');
        adminLogout();
    }

    (function init() {
        const code = new URLSearchParams(window.location.search).get('code');
        if (code) {
            showBookDetail(code);
        } else {
            showHome();
        }
    })();
</script>
