<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>维也纳基督教会 · 图书借阅</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e0e7ff, #f0f4ff);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header {
            text-align: center;
            color: #1e293b;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 2.6rem; }
        .header p { font-size: 1.1rem; color: #475569; }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }
        .category-card {
            background: white;
            border-radius: 16px;
            padding: 14px 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
            color: #1e293b;
            border: 2px solid transparent;
            min-width: 70px;
            text-align: center;
            font-size: 0.9rem;
        }
        .category-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .category-card.active {
            border-color: #4f46e5;
            background: #eef2ff;
        }
        .category-card .icon { font-size: 1.6rem; display: block; margin-bottom: 2px; }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
            justify-content: flex-end;
        }

        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th { background: #f8fafc; font-weight: 600; }
        .badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-available { background: #d1fae5; color: #065f46; }
        .badge-borrowed { background: #fef3c7; color: #92400e; }
        .btn {
            padding: 4px 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.15s;
        }
        .btn-borrow { background: #f59e0b; color: #fff; }
        .btn-return { background: #10b981; color: #fff; }
        .btn-primary { background: #4f46e5; color: #fff; }
        .btn-outline { background: transparent; color: #4f46e5; border: 2px solid #4f46e5; }
        .btn:hover { opacity: 0.85; }

        .modal-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index:1000;
        }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
        }
        .modal-box h3 { margin-bottom: 16px; }
        .modal-box .form-group { margin-bottom: 12px; }
        .modal-box label { font-weight: 600; display: block; margin-bottom: 4px; }
        .modal-box input { width: 100%; padding: 8px 12px; border: 2px solid #d1d5db; border-radius: 8px; }
        .modal-box .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .hidden { display: none; }
        .text-muted { color: #94a3b8; text-align: center; padding: 20px 0; }
        .highlight { background: #fef9c3; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⛪ 维也纳基督教会</h1>
        <p>图书借阅管理系统</p>
    </div>

    <!-- 分类导航：教会1～10 -->
    <div id="categoryNav" class="categories"></div>

    <div class="card">
        <div class="toolbar">
            <button class="btn btn-primary" onclick="loadBooks()">🔄 刷新</button>
            <button class="btn btn-primary" onclick="window.exportBooks()">📥 导出</button>
            <button class="btn btn-outline" onclick="document.getElementById('importFileInput').click()">📤 导入</button>
            <input type="file" id="importFileInput" accept=".csv,.xlsx" style="display:none;" onchange="window.importBooks(this)">
        </div>
    </div>

    <div class="card">
        <div style="overflow-x:auto;">
            <table id="booksTable">
                <thead>
                    <tr>
                        <th>编号</th>
                        <th>书名</th>
                        <th>分类</th>
                        <th>状态</th>
                        <th>借阅人</th>
                        <th>应还日期</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="booksBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 借书模态框（无电话） -->
    <div id="borrowModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3>📤 借出图书</h3>
            <p id="borrowBookInfo" style="margin-bottom:12px; color:#475569;"></p>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="borrowName" placeholder="借书人姓名">
            </div>
            <div class="form-group">
                <label>借书日期</label>
                <input type="date" id="borrowDate">
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="confirmBorrow()">确认借出</button>
                <button class="btn btn-outline" onclick="closeBorrowModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 导入结果弹窗 -->
    <div id="importModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="importResultTitle">📤 导入结果</h3>
            <p id="importResultMsg"></p>
            <div class="btn-row" style="justify-content:center;">
                <button class="btn btn-primary" onclick="window.closeImportModal()">确定</button>
            </div>
        </div>
    </div>

    <!-- 逾期弹窗 -->
    <div id="overdueModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3>⚠️ 逾期未还提醒</h3>
            <div id="overdueList"></div>
            <div class="btn-row" style="justify-content:center;">
                <button class="btn btn-primary" onclick="window.closeOverdue()">知道了</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ================= 配置 Supabase =================
    var SUPABASE_URL = 'https://ervhqbfelryohfvyuaok.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVydmhxYmZlbHJ5b2hmdnl1YW9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMTA5MTQsImV4cCI6MjA5ODg4NjkxNH0.z-FdF47zHB3ai0f1VylUgVbxWUwBZF7I0oY8NAwh2gw';
    var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ================= 固定分类：教会1 ～ 教会10 =================
    var FIXED_CATEGORIES = [];
    for (var i = 1; i <= 10; i++) {
        FIXED_CATEGORIES.push('教会' + i);
    }
    var currentCategory = '全部';
    var allBooks = [];

    // ================= 页面初始化 =================
    window.addEventListener('DOMContentLoaded', function() {
        renderCategories();
        loadBooks();
        document.getElementById('borrowDate').value = new Date().toISOString().split('T')[0];
        // 扫码参数
        var params = new URLSearchParams(window.location.search);
        var code = params.get('code');
        if (code) {
            setTimeout(function() {
                highlightBook(code);
            }, 500);
        }
    });

    // ================= 渲染分类导航 =================
    function renderCategories() {
        var nav = document.getElementById('categoryNav');
        var allCats = ['全部'].concat(FIXED_CATEGORIES);
        nav.innerHTML = allCats.map(function(cat) {
            var active = (cat === currentCategory) ? 'active' : '';
            var icon = (cat === '全部') ? '📚' : '✝️';
            return `<div class="category-card ${active}" onclick="selectCategory('${cat}')">
                <span class="icon">${icon}</span>
                ${cat}
            </div>`;
        }).join('');
    }

    // ================= 选择分类 =================
    window.selectCategory = function(cat) {
        currentCategory = cat;
        renderCategories();
        renderBooks();
    };

    // ================= 加载图书 =================
    async function loadBooks() {
        try {
            var { data, error } = await supabase.from('books').select('*').order('code');
            if (error) throw error;
            allBooks = data;
            renderBooks();
            checkOverdue();
        } catch (e) {
            console.error('加载失败:', e);
            alert('加载数据失败，请刷新重试');
        }
    }

    // ================= 渲染图书表格 =================
    function renderBooks() {
        var tbody = document.getElementById('booksBody');
        var filtered = allBooks.filter(function(b) {
            if (currentCategory !== '全部' && b.category !== currentCategory) return false;
            return true;
        });

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-muted">没有找到符合条件的图书</td></tr>';
            return;
        }

        tbody.innerHTML = filtered.map(function(b) {
            var statusBadge = b.status === '在馆' 
                ? '<span class="badge badge-available">在馆</span>' 
                : '<span class="badge badge-borrowed">借出</span>';
            var actionBtn = b.status === '在馆'
                ? `<button class="btn btn-borrow" onclick="openBorrowModal('${b.code}')">借出</button>`
                : `<button class="btn btn-return" onclick="returnBook('${b.code}')">归还</button>`;
            var highlightClass = (window._highlightCode === b.code) ? 'highlight' : '';
            return `<tr class="${highlightClass}">
                <td><strong>${esc(b.code)}</strong></td>
                <td>${esc(b.book_name)}</td>
                <td>${esc(b.category || '未分类')}</td>
                <td>${statusBadge}</td>
                <td>${esc(b.borrower_name || '')}</td>
                <td>${b.due_date || '—'}</td>
                <td>${actionBtn}</td>
            </tr>`;
        }).join('');

        window._highlightCode = null;
    }

    // ================= 高亮图书（扫码） =================
    function highlightBook(code) {
        window._highlightCode = code;
        var book = allBooks.find(function(b) { return b.code === code; });
        if (book && book.category) {
            // 如果该分类属于教会1~10，则自动切换到该分类
            if (FIXED_CATEGORIES.indexOf(book.category) !== -1) {
                currentCategory = book.category;
            } else {
                currentCategory = '全部';
            }
            renderCategories();
            renderBooks();
        } else {
            renderBooks();
        }
    }

    // ================= 借书模态框 =================
    var borrowTargetCode = null;

    window.openBorrowModal = function(code) {
        borrowTargetCode = code;
        var book = allBooks.find(function(b) { return b.code === code; });
        if (!book) return alert('图书不存在');
        document.getElementById('borrowBookInfo').innerText = '📕 ' + book.book_name + ' (' + book.code + ')';
        document.getElementById('borrowName').value = '';
        document.getElementById('borrowDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('borrowModal').classList.remove('hidden');
    };

    window.closeBorrowModal = function() {
        document.getElementById('borrowModal').classList.add('hidden');
        borrowTargetCode = null;
    };

    window.confirmBorrow = async function() {
        if (!borrowTargetCode) return;
        var name = document.getElementById('borrowName').value.trim();
        var date = document.getElementById('borrowDate').value;
        if (!name) return alert('请填写姓名');
        if (!date) return alert('请选择日期');

        // ===== 修改：借书期限改为 3 个月（90 天） =====
        var dueDateObj = new Date(date);
        dueDateObj.setDate(dueDateObj.getDate() + 90);   // 90天 = 3个月
        var dueDateStr = dueDateObj.toISOString().split('T')[0];

        try {
            var { error } = await supabase
                .from('books')
                .update({ status: '借出', borrower_name: name, borrow_date: date, due_date: dueDateStr })
                .eq('code', borrowTargetCode)
                .eq('status', '在馆');
            if (error) {
                if (error.message.includes('0 rows')) alert('此书可能已被他人借走');
                else alert('借书失败：' + error.message);
                return;
            }
            var book = allBooks.find(function(b) { return b.code === borrowTargetCode; });
            await supabase.from('records').insert({
                code: borrowTargetCode,
                book_name: book.book_name,
                borrower_name: name,
                borrower_phone: '',
                action: '借出',
                date: date,
                due_date: dueDateStr
            });
            alert('✅ 借书成功！应还日期：' + dueDateStr);
            closeBorrowModal();
            loadBooks();
        } catch (e) {
            alert('借书出错，请查看控制台');
            console.error(e);
        }
    };

    // ================= 还书 =================
    window.returnBook = async function(code) {
        if (!confirm('确认归还此书吗？')) return;
        var date = new Date().toISOString().split('T')[0];
        try {
            var { data: book } = await supabase.from('books').select('book_name, borrower_name, borrower_phone').eq('code', code).single();
            if (!book) return alert('图书不存在');
            var { error } = await supabase
                .from('books')
                .update({ status: '在馆', borrower_name: '', borrower_phone: '', borrow_date: '', due_date: '' })
                .eq('code', code)
                .eq('status', '借出');
            if (error) return alert('还书失败：' + error.message);
            await supabase.from('records').insert({
                code: code,
                book_name: book.book_name,
                borrower_name: book.borrower_name,
                borrower_phone: book.borrower_phone,
                action: '归还',
                date: date
            });
            alert('✅ 还书成功！');
            loadBooks();
        } catch (e) {
            alert('还书出错，请查看控制台');
            console.error(e);
        }
    };

    // ================= 导入 / 导出 =================
    window.importBooks = async function(input) {
        var file = input.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = async function(e) {
            try {
                var wb = XLSX.read(e.target.result, { type: 'array' });
                var ws = wb.Sheets[wb.SheetNames[0]];
                var rows = XLSX.utils.sheet_to_json(ws);
                var books = rows.map(function(r) {
                    return {
                        code: String(r.code).trim(),
                        book_name: String(r.book_name).trim(),
                        category: String(r.category || '').trim(),
                        status: '在馆'
                    };
                }).filter(function(b) { return b.code && b.book_name; });
                var seen = {};
                var unique = [];
                for (var i = 0; i < books.length; i++) {
                    if (!seen[books[i].code]) {
                        seen[books[i].code] = true;
                        unique.push(books[i]);
                    }
                }
                if (!unique.length) throw new Error('未找到有效数据');
                var { error } = await supabase.from('books').upsert(unique, { onConflict: 'code' });
                if (error) throw error;
                document.getElementById('importResultTitle').innerText = '✅ 导入成功';
                document.getElementById('importResultMsg').innerText = '成功导入 ' + unique.length + ' 本图书';
                document.getElementById('importModal').classList.remove('hidden');
                loadBooks();
            } catch(err) {
                document.getElementById('importResultTitle').innerText = '❌ 导入失败';
                document.getElementById('importResultMsg').innerText = err.message;
                document.getElementById('importModal').classList.remove('hidden');
            }
        };
        reader.readAsArrayBuffer(file);
        input.value = '';
    };

    window.exportBooks = async function() {
        try {
            var { data, error } = await supabase.from('books').select('code, book_name, category, status, borrower_name, borrower_phone, borrow_date, due_date').order('code');
            if (error) throw error;
            var headers = ['编号', '书名', '分类', '状态', '借阅人', '电话', '借书日期', '应还日期'];
            var rows = data.map(function(b) { return [b.code, b.book_name, b.category, b.status, b.borrower_name, b.borrower_phone, b.borrow_date, b.due_date]; });
            var wb = XLSX.utils.book_new();
            var ws = XLSX.utils.aoa_to_sheet([headers].concat(rows));
            XLSX.utils.book_append_sheet(wb, ws, '图书库存');
            XLSX.writeFile(wb, '图书库存.xlsx');
        } catch (e) {
            alert('导出失败：' + e.message);
            console.error(e);
        }
    };

    // ================= 检查逾期 =================
    async function checkOverdue() {
        var today = new Date().toISOString().split('T')[0];
        var { data, error } = await supabase.from('books').select('*').eq('status', '借出').lt('due_date', today);
        if (error || !data || !data.length) return;
        var list = document.getElementById('overdueList');
        list.innerHTML = data.map(function(b) {
            return '<p>📕 <strong>' + b.book_name + '</strong> (' + b.code + ')<br>借阅人：' + b.borrower_name + ' ' + (b.borrower_phone || '') + '<br>应还日期：<span style="color:red;">' + b.due_date + '</span></p>';
        }).join('');
        document.getElementById('overdueModal').classList.remove('hidden');
    }

    // ================= 工具函数 =================
    function esc(str) { var d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }
    window.closeImportModal = function() { document.getElementById('importModal').classList.add('hidden'); };
    window.closeOverdue = function() { document.getElementById('overdueModal').classList.add('hidden'); };
</script>
</body>
</html>
