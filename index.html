<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>维也纳基督教会 · 图书借阅</title>
    <!-- 外部库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <!-- 样式 -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <div class="church-header">
                <img src="./images/logo.png" alt="维也纳基督教会">
                <p>图书借阅</p>
            </div>
            <div class="card" id="dynamicContent"></div>
        </div>
        <div class="sidebar">
            <div class="sidebar-card" onclick="App.showNotice()">
                <div class="icon">📖</div><h3>借还书须知</h3>
            </div>
            <div class="sidebar-card" onclick="App.switchToBookList()">
                <div class="icon">📚</div><h3>图书查询</h3>
            </div>
            <div class="sidebar-card" onclick="App.openAdmin()">
                <div class="icon">⚙️</div><h3>管理</h3>
            </div>
        </div>
    </div>

    <!-- 弹窗（不变） -->
    <div id="noticeModal" class="modal-overlay hidden">
        <div class="modal">
            <h2>📖 借还书须知</h2>
            <div style="text-align:left; line-height:1.8;">
                <h3>借书说明</h3><ol><li>扫描二维码。</li><li>输入姓名。</li><li>点击借出。</li></ol>
                <h3>还书说明</h3><ol><li>扫描二维码。</li><li>输入姓名。</li><li>点击归还。</li></ol>
                <h3>借阅期限</h3><p>三个月，到期请归还。</p>
            </div>
            <button class="btn" onclick="document.getElementById('noticeModal').classList.add('hidden')">关闭</button>
        </div>
    </div>

    <div id="loginModal" class="modal-overlay hidden">
        <div class="modal">
            <h3>🔑 管理员登录</h3>
            <div class="form-group"><input type="password" id="loginPassword" placeholder="密码"></div>
            <button class="btn" onclick="App.adminLogin()">登录</button>
            <button class="btn btn-outline" onclick="document.getElementById('loginModal').classList.add('hidden')">取消</button>
        </div>
    </div>

    <div id="adminView" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:2000; overflow-y:auto; padding:24px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);">
        <button class="btn btn-danger" style="float:right;" onclick="App.adminLogout()">退出</button>
        <h2>📊 管理员后台</h2>
        <div class="tab-nav" style="margin-top:12px;">
            <button class="active" data-tab="dashboard">📈 统计</button>
            <button data-tab="books">📚 图书管理</button>
            <button data-tab="records">📜 借阅历史</button>
            <button data-tab="overdue">⚠️ 逾期</button>
            <button data-tab="import">📤 导入</button>
            <button data-tab="export">📥 导出</button>
            <button data-tab="qrcode">📱 二维码</button>
            <button data-tab="settings">⚙️ 设置</button>
        </div>
        <div id="adminContent"></div>
    </div>

    <!-- JS 文件按顺序加载（使用相对路径） -->
    <script src="./js/supabase.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/books.js"></script>
    <script src="./js/borrow.js"></script>
    <script src="./js/admin.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
