<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>维也纳基督教会 · 图书借阅</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- SheetJS 用于导入/导出 Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #4a6cf7;
            --borrow: #f59e0b;
            --return: #10b981;
            --danger: #ef4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
           
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 16px;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
        .card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            backdrop-filter: blur(5px);
        }
        .church-header {
            text-align: center;
            padding: 10px 0;
            color: #fff;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
        }
        .church-header h1 { font-size: 2.8rem; letter-spacing: 2px; }
        h2 { font-size: 1.2rem; margin-bottom: 12px; color: #333; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
        .form-group { flex: 1; min-width: 130px; }
        label { font-size: 0.8rem; font-weight: 600; color: #555; display: block; margin-bottom: 4px; }
        input, select {
            width: 100%; padding: 10px; border: 2px solid #ddd;
            border-radius: 8px; font-size: 0.95rem;
        }
        button {
            padding: 10px 20px; border: none; border-radius: 20px;
            font-weight: 600; cursor: pointer; font-size: 0.9rem;
        }
        .btn-borrow { background: var(--borrow); color: #fff;  margin-top: 12px;}
        .btn-return { background: var(--return); color: #fff;  margin-top: 12px;}
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-outline {
            background: #fff; color: var(--primary);
            border: 2px solid var(--primary);
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8fafc; font-weight: 600; }
        .badge { padding: 3px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
        .badge-available { background: #d1fae5; color: #065f46; }
        .badge-borrowed { background: #fef3c7; color: #92400e; }
        .overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); display: flex; align-items: center;
            justify-content: center; z-index:999;
        }
        .modal {
            background: #fff; border-radius: 12px; padding: 24px;
            width: 90%; max-width: 450px; text-align: center;
        }
        .toast {
            position: fixed; top: 20px; right: 20px; background: #333;
            color: #fff; padding: 12px 20px; border-radius: 20px;
            font-weight: 600; z-index: 1000; animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
        .hidden { display: none; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        .login-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7); display: flex; align-items: center;
            justify-content: center; z-index:1000;
        }
        .login-box {
            background: #fff; border-radius: 12px; padding: 30px;
            width: 90%; max-width: 400px;
        }
        .login-box h2 { margin-bottom: 20px; }
        .login-box input { margin-bottom: 12px; }
        @media (max-width: 600px) {
            .church-header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<!-- 登录遮罩（默认显示） -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2>🔐 管理员登录</h2>
        <p style="margin-bottom:12px; color:#666;">请使用 Supabase 账号登录</p>
        <input type="email" id="loginEmail" placeholder="邮箱" style="width:100%; padding:10px; border:2px solid #ddd; border-radius:8px;">
        <input type="password" id="loginPassword" placeholder="密码" style="width:100%; padding:10px; border:2px solid #ddd; border-radius:8px;">
        <button class="btn-primary" onclick="login()" style="width:100%; margin-top:10px;">登录</button>
        <p style="margin-top:12px; font-size:0.8rem; color:#999;">首次使用需在 Supabase 中创建账号</p>
    </div>
</div>

<div class="container">
    <!-- 教会标题 -->
    <div class="church-header">
        <h1>⛪ 维也纳基督教会</h1>
        <p style="margin-top:5px; font-size:1.2rem;">图书借阅管理系统</p>
        <p id="userStatus" style="font-size:0.9rem; color:#ddd; margin-top:4px;"></p>
    </div>

    <!-- 借还书卡片 -->
    <div class="card">
        <h2>📖 当前图书：<span id="bookTitle">请扫描二维码</span></h2>
        <p id="bookStatus" style="margin-bottom:10px;"></p>
        <div class="flex-row" id="borrowForm">
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="borrowName" placeholder="借书人姓名">
            </div>
            <div class="form-group">
                <label>电话</label>
                <input type="tel" id="borrowPhone" placeholder="手机号">
            </div>
            <div class="form-group">
                <label>日期</label>
                <input type="date" id="borrowDate">
            </div>
        </div>
        <button class="btn-borrow" id="doBorrow" disabled>📤 借出此书（2周内还）</button>
        <button class="btn-return hidden" id="doReturn" disabled>📥 归还此书</button>
    </div>

    <!-- 图书库存 -->
    <div class="card">
        <h2>📋 图书库存</h2>
        <div style="overflow-x:auto;">
            <table id="booksTable">
                <thead><tr><th>编号</th><th>书名</th><th>分类</th><th>状态</th><th>借阅人</th><th>应还日期</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="btn-row">
            <button class="btn-primary" onclick="location.reload()">🔄 刷新</button>
            <button class="btn-primary" onclick="exportBooks()">📥 导出书单 Excel</button>
            <button class="btn-outline" onclick="document.getElementById('importFileInput').click()">📤 上传书单导入</button>
            <input type="file" id="importFileInput" accept=".csv,.xlsx" style="display:none;" onchange="importBooks(this)">
        </div>
    </div>

    <!-- 借阅记录（密码保护） -->
    <div class="card" id="recordCard">
        <div id="lockArea">
            <h3>🔒 借阅记录（需管理员登录）</h3>
            <p style="font-size:0.8rem; color:#999;">点击下方按钮解锁（需已登录）</p>
            <button class="btn-primary" onclick="unlock()">🔓 解锁</button>
        </div>
        <div id="recordArea" class="hidden">
            <button class="btn-danger" style="float:right;" onclick="lock()">🔒 锁定</button>
            <h3>📜 当前借出</h3>
            <table id="recordsTable">
                <thead><tr><th>编号</th><th>书名</th><th>借阅人</th><th>电话</th><th>借书日期</th><th>应还日期</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 逾期弹窗 -->
<div id="overdueModal" class="overlay hidden">
    <div class="modal">
        <h3>⚠️ 逾期未还提醒</h3>
        <div id="overdueList"></div>
        <button class="btn-primary" onclick="closeOverdue()">知道了</button>
    </div>
</div>

<!-- 导入结果弹窗 -->
<div id="importModal" class="overlay hidden">
    <div class="modal">
        <h3 id="importResultTitle">📤 导入结果</h3>
        <p id="importResultMsg"></p>
        <button class="btn-primary" onclick="closeImportModal()">确定</button>
    </div>
</div>

<script>
    // =====================================================
    // 1. 配置 Supabase（替换为你的项目 URL 和 anon key）
    // =====================================================
    const SUPABASE_URL = 'https://aqlsoomclgcgwpjoutjz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxbHNvb21jbGdjZ3dwam91dGp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDEwNjYsImV4cCI6MjA5ODIxNzA2Nn0.j14ss-ijuzW5QayUjew_6htNoxLySy82cdvpqHJv6Nk';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 当前用户会话
    let session = null;
    let currentBook = null;
    let currentCode = null;
    let isAdmin = false;   // 借阅记录解锁状态

    // =====================================================
    // 2. 登录 / 注销逻辑
    // =====================================================
    async function checkAuth() {
        const { data: { session: s }, error } = await supabase.auth.getSession();
        if (error || !s) {
            document.getElementById('loginOverlay').classList.remove('hidden');
            return;
        }
        session = s;
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('userStatus').innerText = '已登录：' + s.user.email;
        // 登录成功后加载数据
        loadBooks();
        // 检查 URL 参数
        const params = new URLSearchParams(window.location.search);
        const scannedCode = params.get('code');
        if (scannedCode) {
            currentCode = scannedCode;
            loadCurrentBook(scannedCode);
        }
    }

    async function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        if (!email || !password) return alert('请输入邮箱和密码');
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
            alert('登录失败：' + error.message);
            return;
        }
        // 登录成功，刷新页面
        location.reload();
    }

    // 页面加载时先检查登录状态
    checkAuth();

    // =====================================================
    // 3. 核心业务函数（借书、还书、加载等）
    // =====================================================
    // 加载所有图书（库存表）
    async function loadBooks() {
        const { data: books, error } = await supabase
            .from('books')
            .select('*')
            .order('code', { ascending: true });
        if (error) {
            console.error('加载图书失败:', error);
            return;
        }
        const tbody = document.querySelector('#booksTable tbody');
        if (!books || books.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;">暂无图书，请先导入书单</td></tr>';
            return;
        }
        tbody.innerHTML = books.map(b => {
            const statusBadge = b.status === '在馆'
                ? '<span class="badge badge-available">在馆</span>'
                : '<span class="badge badge-borrowed">借出</span>';
            return `<tr>
                <td><strong>${esc(b.code)}</strong></td>
                <td>${esc(b.book_name)}</td>
                <td>${esc(b.category || '—')}</td>
                <td>${statusBadge}</td>
                <td>${esc(b.borrower_name || '')} ${b.borrower_phone ? esc(b.borrower_phone) : ''}</td>
                <td>${b.due_date || '—'}</td>
            </tr>`;
        }).join('');
    }

    // 加载单本图书（扫码后显示）
    async function loadCurrentBook(code) {
        const { data: book, error } = await supabase
            .from('books')
            .select('*')
            .eq('code', code)
            .single();
        if (error || !book) {
            document.getElementById('bookTitle').innerText = '未找到图书：' + code;
            document.getElementById('bookStatus').innerHTML = '';
            document.getElementById('doBorrow').disabled = true;
            document.getElementById('doReturn').classList.add('hidden');
            return;
        }
        currentBook = book;
        document.getElementById('bookTitle').innerText = book.book_name + ' (' + book.code + ')';
        const statusEl = document.getElementById('bookStatus');
        if (book.status === '在馆') {
            statusEl.innerHTML = '<span class="badge badge-available">✅ 在馆</span>';
            document.getElementById('doBorrow').disabled = false;
            document.getElementById('doBorrow').classList.remove('hidden');
            document.getElementById('doReturn').classList.add('hidden');
        } else {
            statusEl.innerHTML = '<span class="badge badge-borrowed">📖 借出</span> ' +
                '借阅人：' + book.borrower_name + ' ' + book.borrower_phone +
                ' | 应还：' + book.due_date;
            document.getElementById('doReturn').disabled = false;
            document.getElementById('doReturn').classList.remove('hidden');
            document.getElementById('doBorrow').classList.add('hidden');
        }
    }

    // 借书
    document.getElementById('doBorrow').addEventListener('click', async () => {
        if (!currentCode) return alert('请先扫描图书二维码');
        const name = document.getElementById('borrowName').value.trim();
        const phone = document.getElementById('borrowPhone').value.trim();
        const date = document.getElementById('borrowDate').value;
        if (!name || !phone) return alert('请填写姓名和电话');
        if (!date) return alert('请选择日期');

        // 计算应还日期（14天后）
        const dueDateObj = new Date(date);
        dueDateObj.setDate(dueDateObj.getDate() + 14);
        const dueDate = dueDateObj.toISOString().split('T')[0];

        // 1. 更新 books 表（同时检查是否仍在馆，避免并发）
        const { error: updateError } = await supabase
            .from('books')
            .update({
                status: '借出',
                borrower_name: name,
                borrower_phone: phone,
                borrow_date: date,
                due_date: dueDate,
            })
            .eq('code', currentCode)
            .eq('status', '在馆');   // 乐观锁

        if (updateError) {
            if (updateError.message.includes('0 rows')) {
                alert('此书可能已被他人借走，请刷新重试');
            } else {
                alert('借书失败：' + updateError.message);
            }
            return;
        }

        // 2. 插入记录
        const { error: insertError } = await supabase
            .from('records')
            .insert({
                code: currentCode,
                book_name: currentBook.book_name,
                borrower_name: name,
                borrower_phone: phone,
                action: '借出',
                date: date,
                due_date: dueDate,
            });

        if (insertError) {
            console.error('记录插入失败', insertError);
        }

        alert('✅ 借书成功！\n应还日期：' + dueDate);
        location.reload();
    });

    // 还书
    document.getElementById('doReturn').addEventListener('click', async () => {
        if (!currentCode) return;
        const date = document.getElementById('borrowDate').value || new Date().toISOString().split('T')[0];

        // 先获取当前图书信息（用于记录）
        const { data: book, error: fetchError } = await supabase
            .from('books')
            .select('book_name, borrower_name, borrower_phone')
            .eq('code', currentCode)
            .single();
        if (fetchError || !book) return alert('图书不存在');

        // 更新状态
        const { error: updateError } = await supabase
            .from('books')
            .update({
                status: '在馆',
                borrower_name: '',
                borrower_phone: '',
                borrow_date: '',
                due_date: '',
            })
            .eq('code', currentCode)
            .eq('status', '借出');  // 确保只处理借出的书

        if (updateError) {
            alert('还书失败：' + updateError.message);
            return;
        }

        // 插入记录
        const { error: insertError } = await supabase
            .from('records')
            .insert({
                code: currentCode,
                book_name: book.book_name,
                borrower_name: book.borrower_name,
                borrower_phone: book.borrower_phone,
                action: '归还',
                date: date,
            });

        if (insertError) console.error('记录插入失败', insertError);

        alert('✅ 还书成功！');
        location.reload();
    });

    // =====================================================
    // 4. 导入 / 导出
    // =====================================================
    async function importBooks(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(firstSheet);

                // 准备插入数据（去重）
                const booksToInsert = rows.map(row => ({
                    code: String(row.code).trim(),
                    book_name: String(row.book_name).trim(),
                    category: String(row.category || '').trim(),
                    status: '在馆',
                })).filter(b => b.code && b.book_name);

                if (booksToInsert.length === 0) {
                    document.getElementById('importResultTitle').innerText = '⚠️ 无有效数据';
                    document.getElementById('importResultMsg').innerText = '未找到有效的 code 和 book_name 列';
                    document.getElementById('importModal').classList.remove('hidden');
                    return;
                }

                // 批量 upsert (code 冲突则更新书名和分类)
                const { data: result, error } = await supabase
                    .from('books')
                    .upsert(booksToInsert, { onConflict: 'code', ignoreDuplicates: false });

                if (error) throw error;

                document.getElementById('importResultTitle').innerText = '✅ 导入成功';
                document.getElementById('importResultMsg').innerText = `成功导入 ${booksToInsert.length} 本图书`;
                document.getElementById('importModal').classList.remove('hidden');
                loadBooks();
            } catch (err) {
                document.getElementById('importResultTitle').innerText = '❌ 导入失败';
                document.getElementById('importResultMsg').innerText = err.message;
                document.getElementById('importModal').classList.remove('hidden');
            }
        };
        reader.readAsArrayBuffer(file);
        input.value = '';
    }

    async function exportBooks() {
        // 需要管理员已登录（即 session 存在）
        if (!session) {
            alert('请先登录管理员账号');
            return;
        }
        const { data: books, error } = await supabase
            .from('books')
            .select('code, book_name, category, status, borrower_name, borrower_phone, borrow_date, due_date')
            .order('code');
        if (error) {
            alert('获取数据失败：' + error.message);
            return;
        }
        const headers = ['编号', '书名', '分类', '状态', '借阅人', '电话', '借书日期', '应还日期'];
        const rows = books.map(b => [
            b.code, b.book_name, b.category, b.status,
            b.borrower_name, b.borrower_phone, b.borrow_date, b.due_date
        ]);
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
        XLSX.utils.book_append_sheet(wb, ws, '图书库存');
        XLSX.writeFile(wb, '图书库存.xlsx');
    }

    // =====================================================
    // 5. 借阅记录（解锁/锁定）
    // =====================================================
    async function unlock() {
        if (!session) {
            alert('请先登录管理员账号');
            return;
        }
        isAdmin = true;
        document.getElementById('lockArea').classList.add('hidden');
        document.getElementById('recordArea').classList.remove('hidden');

        // 加载当前借出的图书
        const { data: borrowedBooks, error } = await supabase
            .from('books')
            .select('*')
            .eq('status', '借出')
            .order('code');
        if (error) {
            console.error(error);
            return;
        }
        const tbody = document.querySelector('#recordsTable tbody');
        if (!borrowedBooks || borrowedBooks.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;">当前没有借出记录</td></tr>';
        } else {
            tbody.innerHTML = borrowedBooks.map(b => `
                <tr>
                    <td>${b.code}</td>
                    <td>${esc(b.book_name)}</td>
                    <td>${esc(b.borrower_name)}</td>
                    <td>${esc(b.borrower_phone)}</td>
                    <td>${b.borrow_date}</td>
                    <td>${b.due_date}</td>
                </tr>`).join('');
        }

        // 检查逾期
        const today = new Date().toISOString().split('T')[0];
        const { data: overdueBooks, error: overdueError } = await supabase
            .from('books')
            .select('*')
            .eq('status', '借出')
            .lt('due_date', today);
        if (!overdueError && overdueBooks && overdueBooks.length > 0) {
            const list = overdueBooks.map(b =>
                `<p style="margin:6px 0;">📕 <strong>${b.book_name}</strong> (${b.code})<br>
                借阅人：${b.borrower_name} ${b.borrower_phone}<br>
                应还日期：<span style="color:red;">${b.due_date}</span></p>`
            ).join('');
            document.getElementById('overdueList').innerHTML = list;
            document.getElementById('overdueModal').classList.remove('hidden');
        }
    }

    function lock() {
        isAdmin = false;
        document.getElementById('lockArea').classList.remove('hidden');
        document.getElementById('recordArea').classList.add('hidden');
    }

    // =====================================================
    // 6. 工具函数
    // =====================================================
    function esc(str) {
        const d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
    }

    function closeOverdue() {
        document.getElementById('overdueModal').classList.add('hidden');
    }

    function closeImportModal() {
        document.getElementById('importModal').classList.add('hidden');
    }

    // 默认日期
    document.getElementById('borrowDate').value = new Date().toISOString().split('T')[0];

    // 如果 URL 有 code 参数，在登录后会自动加载
</script>
</body>
</html>
